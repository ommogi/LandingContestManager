<svg width="220" height="268" viewBox="0 0 220 268" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card -->
  <rect width="220" height="268" rx="20" fill="#141C28" stroke="#2A3342"/>
  <!-- Header -->
  <rect x="20" y="20" width="80" height="9" rx="4" fill="#566174"/>
  <rect x="20" y="36" width="124" height="13" rx="6" fill="#F7F3EA"/>
  <!-- Arrow indicator -->
  <rect x="152" y="38" width="16" height="8" rx="4" fill="#566174"/>
  <rect x="164" y="36" width="8" height="12" rx="4" fill="#566174" transform="rotate(45 164 36)"/>
  <!-- Separator -->
  <rect x="0" y="60" width="220" height="1" fill="#2A3342"/>
  <!-- Stats label -->
  <rect x="20" y="72" width="88" height="8" rx="4" fill="#566174"/>
  <!-- Big numbers: 5 / 12 -->
  <rect x="20" y="86" width="44" height="36" rx="10" fill="#B8FF7A" fill-opacity="0.12"/>
  <rect x="30" y="96" width="24" height="16" rx="6" fill="#B8FF7A"/>
  <rect x="74" y="96" width="12" height="4" rx="2" fill="#566174"/>
  <rect x="94" y="86" width="52" height="36" rx="10" fill="#263041"/>
  <rect x="104" y="96" width="32" height="16" rx="6" fill="#566174"/>
  <!-- Progress bar -->
  <rect x="20" y="138" width="64" height="8" rx="4" fill="#566174"/>
  <rect x="20" y="154" width="180" height="8" rx="4" fill="#1A2332"/>
  <rect x="20" y="154" width="75" height="8" rx="4" fill="#B8FF7A" fill-opacity="0.65"/>
  <!-- Dots row: 5 green + 7 grey -->
  <circle cx="26" cy="180" r="5" fill="#B8FF7A"/>
  <circle cx="40" cy="180" r="5" fill="#B8FF7A"/>
  <circle cx="54" cy="180" r="5" fill="#B8FF7A"/>
  <circle cx="68" cy="180" r="5" fill="#B8FF7A"/>
  <circle cx="82" cy="180" r="5" fill="#B8FF7A"/>
  <circle cx="96" cy="180" r="5" fill="#2A3342"/>
  <circle cx="110" cy="180" r="5" fill="#2A3342"/>
  <circle cx="124" cy="180" r="5" fill="#2A3342"/>
  <circle cx="138" cy="180" r="5" fill="#2A3342"/>
  <circle cx="152" cy="180" r="5" fill="#2A3342"/>
  <circle cx="166" cy="180" r="5" fill="#2A3342"/>
  <circle cx="180" cy="180" r="5" fill="#2A3342"/>
  <!-- Separator -->
  <rect x="0" y="200" width="220" height="1" fill="#2A3342"/>
  <!-- Button -->
  <rect x="20" y="214" width="180" height="32" rx="16" fill="#B8FF7A" fill-opacity="0.12" stroke="#B8FF7A" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="40" y="224" width="96" height="10" rx="5" fill="#B8FF7A"/>
  <rect x="152" y="226" width="16" height="6" rx="3" fill="#B8FF7A" fill-opacity="0.5"/>
</svg>
